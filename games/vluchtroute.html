<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Vluchtroute</title>
  <style>
    :root{--ink:#f7f1df;--muted:#bbb5a5;--gold:#e0bb68;--red:#df6657;--green:#76bd83;--panel:#172018;--line:rgba(224,187,104,.25)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#0b100b;color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow-x:hidden}button{font:inherit}
    body{padding:max(10px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-left));background:radial-gradient(circle at 50% 0,#263323 0,transparent 40%),#0b100b}
    .app{width:min(100%,720px);margin:auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}.title small{display:block;color:var(--gold);font-size:.68rem;font-weight:900;letter-spacing:.18em}.title h1{margin:1px 0 0;font:900 clamp(1.6rem,7vw,2.35rem)/1 Georgia,serif}.close{padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#172018;color:var(--muted);font-weight:800}
    .hud{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}.stat{padding:7px 5px;border:1px solid var(--line);border-radius:10px;background:rgba(23,32,24,.94);text-align:center}.stat span{display:block;color:var(--muted);font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.stat b{font-size:.95rem;color:#f5d58c}.lives{letter-spacing:.07em;color:var(--red)!important}
    .progress{height:6px;margin:0 1px 8px;border-radius:6px;background:#242a23;overflow:hidden}.progress i{display:block;width:0;height:100%;background:linear-gradient(90deg,#bd913e,#f5d58c);transition:width .2s}
    .stage{position:relative;height:min(62dvh,590px);min-height:390px;overflow:hidden;border:2px solid #5c523a;border-radius:20px;background:#25381f;box-shadow:0 15px 45px #0009;touch-action:none;user-select:none}
    .forest{position:absolute;inset:0;background:radial-gradient(ellipse at 5% 25%,#527541 0 7%,transparent 8%),radial-gradient(ellipse at 96% 45%,#496b39 0 8%,transparent 9%),linear-gradient(90deg,#1d371c 0 14%,transparent 14% 86%,#1d371c 86%)}
    .road{position:absolute;inset:-5% 13% -5%;overflow:hidden;background:#3d4140;clip-path:polygon(36% 0,64% 0,100% 100%,0 100%);box-shadow:inset 20px 0 0 #897d61,inset -20px 0 0 #897d61}
    .road:before,.road:after{content:"";position:absolute;top:-20%;bottom:-20%;width:5px;background:repeating-linear-gradient(180deg,#eee4b9 0 28px,transparent 28px 55px);animation:road .8s linear infinite}.road:before{left:38%}.road:after{right:38%}.slow .road:before,.slow .road:after{animation-duration:1.5s}@keyframes road{to{transform:translateY(55px)}}
    .finish{position:absolute;z-index:3;left:17%;right:17%;top:15%;height:24px;display:none;background:repeating-conic-gradient(#eee 0 25%,#222 0 50%) 0/24px 24px;box-shadow:0 3px 7px #0008}.finish.show{display:block;animation:finish 2.4s linear forwards}@keyframes finish{from{transform:translateY(-100px) scale(.55)}to{transform:translateY(500px) scale(1.55)}}
    .entity{position:absolute;z-index:4;width:56px;height:56px;display:grid;place-items:center;transform:translate(-50%,-50%);font-size:38px;filter:drop-shadow(0 4px 3px #0009);will-change:top}.entity small{position:absolute;bottom:-4px;padding:1px 5px;border-radius:6px;background:#101510d9;color:#fff;font-size:9px;font-weight:900}.bonus{filter:drop-shadow(0 0 9px #f7db82)}
    .car{position:absolute;z-index:6;left:50%;bottom:27px;width:58px;height:94px;transform:translateX(-50%);transition:left .13s cubic-bezier(.2,.8,.3,1);filter:drop-shadow(0 8px 5px #0009)}.car-body{position:absolute;inset:0;border:3px solid #341d12;border-radius:18px 18px 12px 12px;background:linear-gradient(90deg,#80341f 0 16%,#cf5b31 17% 83%,#80341f 84%);box-shadow:inset 0 -16px #6c291d}.car-body:before{content:"";position:absolute;left:11px;right:11px;top:15px;height:27px;border:3px solid #281d18;border-radius:9px 9px 3px 3px;background:linear-gradient(#82a9a8,#283c40)}.car-body:after{content:"🚨";position:absolute;left:50%;top:40px;transform:translateX(-50%);font-size:19px}.shielded{filter:drop-shadow(0 0 12px #67cfff)}.shielded:after{content:"";position:absolute;inset:-10px;border:3px solid #78d9ff;border-radius:50%;animation:pulse .7s alternate infinite}@keyframes pulse{to{opacity:.35;transform:scale(1.08)}}
    .message{position:absolute;z-index:10;left:50%;top:18%;transform:translateX(-50%);min-width:190px;padding:9px 13px;border-radius:10px;background:#0c110dde;text-align:center;font-weight:900;opacity:0;pointer-events:none}.message.show{animation:msg 1.25s}@keyframes msg{15%,70%{opacity:1;transform:translate(-50%,-7px)}to{opacity:0}}
    .overlay{position:absolute;z-index:20;inset:0;display:grid;place-items:center;padding:22px;background:rgba(7,10,7,.88);backdrop-filter:blur(5px)}.card{width:min(100%,430px);padding:22px;border:1px solid var(--line);border-radius:18px;background:#172018;text-align:center}.card h2{margin:0 0 10px;font:900 1.65rem Georgia,serif}.card p{margin:0 0 16px;color:var(--muted);line-height:1.5}.legend{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:14px 0;text-align:left;font-size:.79rem;color:var(--muted)}.legend span{padding:7px;border-radius:8px;background:#0f150f}.primary{min-height:48px;width:100%;border:0;border-radius:12px;background:linear-gradient(#efd184,#b58a39);color:#211b10;font-weight:950}.code{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin:16px 0}.code b{display:grid;place-items:center;width:38px;height:48px;border:1px solid #dcb75e;border-radius:8px;background:#0b110b;color:#f4d889;font:900 1.5rem Georgia,serif}.save{min-height:20px;font-size:.8rem;color:var(--muted)}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:9px}.control{min-height:54px;border:1px solid var(--line);border-radius:14px;background:#1b251b;color:#f5d58c;font-size:1.5rem;font-weight:900;touch-action:manipulation}.control:active{transform:translateY(2px);background:#2b392a}
    @media(min-width:700px){.controls{width:65%;margin:9px auto 0}.stage{min-height:500px}}
  </style>
</head>
<body>
<main class="app">
  <header class="top"><div class="title"><small>DOSSIER V</small><h1 id="game-title">Vluchtroute</h1></div><button class="close" id="close" type="button">Sluit spel</button></header>
  <section class="hud" aria-label="Spelstatus"><div class="stat"><span>Levens</span><b class="lives" id="lives">♥ ♥ ♥</b></div><div class="stat"><span>Afstand</span><b id="distance">0%</b></div><div class="stat"><span>Tijd</span><b id="time">0.0s</b></div><div class="stat"><span>Snelheid</span><b id="speed">1.0×</b></div></section>
  <div class="progress"><i id="progress"></i></div>
  <section class="stage" id="stage" aria-label="Speelveld"><div class="forest"></div><div class="road"></div><div class="finish" id="finish"></div><div class="car" id="car"><div class="car-body"></div></div><div class="message" id="message"></div>
    <div class="overlay" id="overlay"><div class="card" id="card"><h2>De uitweg wacht</h2><p>Wissel van rijstrook en ontwijk alles op de weg. Houd vol tot de finish.</p><div class="legend"><span>🚧 🚓 🌳 🐗<br>obstakels</span><span>🛡️ ⏳<br>bonussen</span><span>← → / A D<br>toetsen</span><span>Veeg of tik<br>op mobiel</span></div><button class="primary" id="start" type="button">Start de vlucht</button></div></div>
  </section>
  <div class="controls"><button class="control" id="left" aria-label="Naar links">←</button><button class="control" id="right" aria-label="Naar rechts">→</button></div>
</main>
<script src="../config.js?v=20260722-3"></script>
<script>
(() => {
  'use strict';
  const PLAYER_KEY='vriendenweekend-player-name', params=new URLSearchParams(location.search);
  const clean=v=>String(v||'').replace(/[<>]/g,'').replace(/\s+/g,' ').trim().slice(0,40);
  const player=clean(localStorage.getItem(PLAYER_KEY)||params.get('playerName')), gameId='vluchtroute';
  const api=window.VRIENDENWEEKEND_CONFIG?.appsScriptUrl||'', stage=document.getElementById('stage'), car=document.getElementById('car');
  const $=id=>document.getElementById(id); let state=null, raf=0, allowed=false, touchX=null, hint='';
  const hazards=[{icon:'🚧',name:'versperring',kind:'life'},{icon:'🚓',name:'politie',kind:'life'},{icon:'🟤',name:'modder',kind:'time'},{icon:'🌳',name:'boom',kind:'life'},{icon:'🐗',name:'wild zwijn',kind:'time'},{icon:'🦌',name:'hert',kind:'time'}];
  const laneX=n=>[31,50,69][n];
  function close(){location.assign('../index.html?playerName='+encodeURIComponent(player||''))}
  function setCar(){car.style.left=laneX(state?.lane??1)+'%'}
  function move(d){if(!state?.running)return;state.lane=Math.max(0,Math.min(2,state.lane+d));setCar()}
  function note(text){const m=$('message');m.textContent=text;m.classList.remove('show');void m.offsetWidth;m.classList.add('show')}
  function spawn(){
    const bonus=Math.random()<.13, def=bonus?(Math.random()<.52?{icon:'🛡️',name:'schild',kind:'shield'}:{icon:'⏳',name:'vertraging',kind:'slow'}):hazards[Math.floor(Math.random()*hazards.length)];
    const lane=Math.floor(Math.random()*3), el=document.createElement('div');el.className='entity'+(bonus?' bonus':'');el.innerHTML=def.icon+'<small>'+def.name+'</small>';el.style.left=laneX(lane)+'%';el.style.top='-45px';stage.appendChild(el);state.entities.push({el,lane,y:-45,def,hit:false});
  }
  function collide(e){
    e.hit=true;e.el.remove();if(e.def.kind==='shield'){state.shieldUntil=performance.now()+6500;car.classList.add('shielded');note('Schild actief: 6 seconden!');return}
    if(e.def.kind==='slow'){state.slowUntil=performance.now()+6000;stage.classList.add('slow');note('Tijd vertraagd!');return}
    if(performance.now()<state.shieldUntil){note('Schild hield je veilig');return}
    if(performance.now()<state.invulnerableUntil)return;state.hits++;state.invulnerableUntil=performance.now()+1100;
    if(e.def.kind==='life'){state.lives--;navigator.vibrate?.(90);note('Botsing! Eén leven kwijt');car.animate([{transform:'translateX(-50%) rotate(-8deg)'},{transform:'translateX(-50%) rotate(8deg)'},{transform:'translateX(-50%)'}],{duration:350});if(state.lives<=0)end(false)}
    else{state.penalty+=4;note('+4 strafseconden');navigator.vibrate?.(45)}
  }
  function draw(now){
    if(!state?.running)return;const dt=Math.min(.035,(now-state.last)/1000);state.last=now;const active=(now-state.started)/1000;state.speed=1+Math.min(1.65,active/32);const slowed=now<state.slowUntil;const velocity=(125*state.speed)*(slowed?.52:1);state.distance=Math.min(100,state.distance+dt*(2.15*state.speed)*(slowed?.62:1));state.spawnIn-=dt;
    if(state.spawnIn<=0){spawn();if(active>18&&Math.random()<Math.min(.46,active/85))setTimeout(()=>state?.running&&spawn(),170);state.spawnIn=Math.max(.32,1.18-active/70)+Math.random()*.42}
    state.entities.forEach(e=>{if(e.hit)return;e.y+=velocity*dt;e.el.style.top=e.y+'px';if(e.y>stage.clientHeight-125&&e.y<stage.clientHeight-43&&e.lane===state.lane)collide(e);else if(e.y>stage.clientHeight+60){e.hit=true;e.el.remove()}});state.entities=state.entities.filter(e=>!e.hit);
    if(now>=state.shieldUntil)car.classList.remove('shielded');if(now>=state.slowUntil)stage.classList.remove('slow');
    $('lives').textContent=('♥ '.repeat(state.lives)+'♡ '.repeat(3-state.lives)).trim();$('distance').textContent=Math.floor(state.distance)+'%';$('progress').style.width=state.distance+'%';$('time').textContent=(active+state.penalty).toFixed(1)+'s';$('speed').textContent=state.speed.toFixed(1)+'×';
    if(state.distance>=100){$('finish').classList.add('show');end(true);return}raf=requestAnimationFrame(draw)
  }
  function reset(){cancelAnimationFrame(raf);stage.querySelectorAll('.entity').forEach(e=>e.remove());$('finish').classList.remove('show');stage.classList.remove('slow');car.classList.remove('shielded');state={running:true,lane:1,lives:3,distance:0,penalty:0,hits:0,entities:[],started:performance.now(),last:performance.now(),spawnIn:.8,shieldUntil:0,slowUntil:0,invulnerableUntil:0,speed:1};setCar();raf=requestAnimationFrame(draw)}
  async function end(won){if(!state?.running)return;state.running=false;cancelAnimationFrame(raf);const seconds=Math.round((performance.now()-state.started)/1000+state.penalty);if(!won){showCard('<h2>De vlucht strandde</h2><p>De wagen kan niet verder. Kies een beter spoor en probeer opnieuw.</p><button class="primary" id="again">Opnieuw proberen</button>');$('again').onclick=reset;return}
    const clue=hint||'De volgende aanwijzing blijft nog verzegeld.';showCard('<h2>Finish bereikt!</h2><p>De verborgen aanwijzing:</p><div class="code" aria-label="'+escapeHtml(clue)+'">'+[...clue].map(c=>'<b>'+escapeHtml(c)+'</b>').join('')+'</div><div class="save" id="save">Score opslaan…</div><button class="primary" id="done">Terug naar dossier</button>');$('done').onclick=close;
    try{const data=await post('score',{name:player,gameId,seconds,attempts:Math.max(1,state.hits),detail:{version:1,lives:state.lives,penalty:state.penalty}});const saved=data.result||data;$('save').textContent=(saved.score||0)+' punten · '+seconds+' seconden'}catch(e){$('save').textContent='Score kon niet worden opgeslagen: '+e.message}
  }
  function showCard(html){$('card').innerHTML=html;$('overlay').style.display='grid'}
  function escapeHtml(value){return String(value).replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}
  async function get(action,p={}){const r=await fetch(api+'?'+new URLSearchParams({action,...p}),{cache:'no-store'}),b=await r.json();if(!r.ok||!b.success)throw Error(b.error||'Verbinding mislukt');return b.data}
  async function post(action,p){const r=await fetch(api,{method:'POST',body:new URLSearchParams({action,payload:JSON.stringify(p)}),cache:'no-store'}),b=await r.json();if(!r.ok||!b.success)throw Error(b.error||'Verbinding mislukt');return b.data}
  async function boot(){
    if(!player||!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(api)){showCard('<h2>Spel niet beschikbaar</h2><p>Open Vluchtroute via de startpagina met een opgeslagen spelernaam.</p><button class="primary" id="back">Terug</button>');$('back').onclick=close;return}
    localStorage.setItem(PLAYER_KEY,player);showCard('<h2>Route verkennen…</h2><p>Toegang wordt gecontroleerd.</p>');
    try{const access=await get('access',{gameId,playerName:player});if(access.game?.title){$('game-title').textContent=access.game.title;document.title=access.game.title}hint=access.game?.hint||'';if(!access.allowed){showCard('<h2>'+(access.completed?'Al voltooid':'Route afgesloten')+'</h2><p>'+(access.completed?'Je hebt deze vluchtroute al gereden.':'Dit spel is nog niet vrijgegeven.')+'</p><button class="primary" id="back">Terug</button>');$('back').onclick=close;return}await post('start',{name:player,gameId,source:'github-pages',userAgent:navigator.userAgent});setInterval(()=>{if(!document.hidden)post('heartbeat',{name:player,gameId}).catch(()=>{})},10000);allowed=true;showCard('<h2>De uitweg wacht</h2><p>Wissel van rijstrook en ontwijk alles op de weg. Houd vol tot de finish.</p><div class="legend"><span>🚧 🚓 🌳 🐗<br>obstakels</span><span>🛡️ ⏳<br>bonussen</span><span>← → / A D<br>toetsen</span><span>Veeg of tik<br>op mobiel</span></div><button class="primary" id="go">Start de vlucht</button>');$('go').onclick=()=>{$('overlay').style.display='none';reset()}}catch(e){showCard('<h2>Geen verbinding</h2><p>'+escapeHtml(e.message)+'</p><button class="primary" id="back">Terug</button>');$('back').onclick=close}
  }
  $('close').onclick=close;$('left').onclick=()=>move(-1);$('right').onclick=()=>move(1);addEventListener('keydown',e=>{if(['ArrowLeft','a','A'].includes(e.key)){e.preventDefault();move(-1)}if(['ArrowRight','d','D'].includes(e.key)){e.preventDefault();move(1)}});stage.addEventListener('touchstart',e=>touchX=e.changedTouches[0].clientX,{passive:true});stage.addEventListener('touchend',e=>{const x=e.changedTouches[0].clientX,d=x-touchX;if(Math.abs(d)>28)move(d>0?1:-1);else move(x<innerWidth/2?-1:1)},{passive:true});boot();
})();
</script>
</body>
</html>
