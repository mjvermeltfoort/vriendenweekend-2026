<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1b2119">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vriendenweekend">
  <meta name="description" content="Spellen en hints voor Vriendenweekend 2026">
  <link rel="manifest" href="manifest.webmanifest?v=20260721-21">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Vriendenweekend 2026</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10130f;
      --panel: #1c211b;
      --text: #f5f0df;
      --muted: #c5bfaa;
      --accent: #a8833e;
      --accent-2: #d4bd78;
      --border: rgba(255,255,255,.14);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background:
        radial-gradient(circle at 50% -10%, rgba(168,131,62,.22), transparent 30rem),
        var(--bg);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: calc(8px + env(safe-area-inset-top)) 12px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(28,33,27,.96);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 900;
    }

    .brand-icon {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border-radius: 12px;
      background: linear-gradient(145deg, var(--accent-2), var(--accent));
      color: #241d10;
      font-size: 22px;
    }

    .brand-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .install-button {
      display: none;
      min-height: 40px;
      padding: 9px 13px;
      border: 0;
      border-radius: 11px;
      background: linear-gradient(145deg, var(--accent-2), var(--accent));
      color: #241d10;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .install-button.show { display: inline-flex; align-items: center; }

    .frame-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #game-frame {
      display: block;
      width: 100%;
      height: 100%;
      min-width: 0;
      border: 0;
      background: var(--bg);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      transition: opacity .2s ease, visibility .2s ease;
      z-index: 2;
    }

    .loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loading-card { text-align: center; color: var(--muted); }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border: 4px solid rgba(255,255,255,.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .error {
      display: none;
      position: absolute;
      inset: 0;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      z-index: 3;
    }

    .error.show { display: grid; }
    .error-content { max-width: 560px; text-align: center; }
    .error-content p { color: var(--muted); line-height: 1.6; }
    .error-content a { color: var(--accent-2); }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 560px) {
      .toolbar { min-height: 50px; padding-inline: 9px; }
      .brand-icon { width: 34px; height: 34px; border-radius: 10px; font-size: 19px; }
      .brand-text { font-size: 14px; }
      .install-button { min-height: 36px; padding: 7px 10px; font-size: 14px; }
    }

    @media (display-mode: standalone) {
      .toolbar { padding-top: calc(8px + env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <div class="brand" aria-label="Het Verzegelde Dossier">
        <span class="brand-icon" aria-hidden="true">⚜</span>
        <span class="brand-text">Vriendenweekend 2026 - Het Verzegelde Dossier</span>
      </div>
      <button class="install-button" id="install-button" type="button">Installeer app</button>
    </header>

    <section class="frame-wrap">
      <div class="loading" id="loading" aria-live="polite">
        <div class="loading-card">
          <div class="spinner" aria-hidden="true"></div>
          <div>Archiefstukken worden geladen…</div>
        </div>
      </div>

      <div class="error" id="error">
        <div class="error-content">
          <h1>Het archief kon niet laden</h1>
          <p>Controleer de Apps Script-link in <code>config.js</code> en controleer of de web-app toegankelijk is voor iedereen.</p>
          <p><a id="direct-link" href="#" target="_blank" rel="noopener">Open het archief rechtstreeks</a></p>
        </div>
      </div>

      <iframe
        id="game-frame"
        title="Vriendenweekend spellen"
        allow="fullscreen"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </section>
  </main>

  <script src="config.js?v=20260721-21"></script>
  <script>
    (() => {
      const frame = document.getElementById('game-frame');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const directLink = document.getElementById('direct-link');
      const installButton = document.getElementById('install-button');
      const appUrl = window.VRIENDENWEEKEND_CONFIG?.appsScriptUrl || '';
      let deferredPrompt = null;
      let loadTimer = null;

      if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(?:[?#].*)?$/.test(appUrl)) {
        loading.classList.add('hidden');
        error.classList.add('show');
      } else {
        frame.src = appUrl;
        directLink.href = appUrl;
        loadTimer = window.setTimeout(() => {
          loading.classList.add('hidden');
        }, 12000);

        frame.addEventListener('load', () => {
          window.clearTimeout(loadTimer);
          loading.classList.add('hidden');
        });
      }

      window.addEventListener('beforeinstallprompt', event => {
        event.preventDefault();
        deferredPrompt = event;
        installButton.classList.add('show');
      });

      installButton.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installButton.classList.remove('show');
      });

      window.addEventListener('appinstalled', () => {
        installButton.classList.remove('show');
        deferredPrompt = null;
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js').catch(console.error);
        });
      }
    })();
  </script>
</body>
</html>
